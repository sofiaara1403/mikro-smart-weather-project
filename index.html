<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<header>

<h1>
<i class="fa-solid fa-cloud"></i>
Smart Weather
</h1>

<div id="status">
🟢 ONLINE
</div>

</header>

<div class="cards">

<div class="card">
<h3>🌡️ Suhu</h3>
<div class="value" id="temp">
30°C
</div>
</div>

<div class="card">
<h3>💧 Kelembapan</h3>
<div class="value" id="hum">
75%
</div>
</div>

<div class="card">
<h3>🌫️ Air Quality</h3>
<div class="value" id="air">
120 PPM
</div>
</div>

</div>

<div class="charts">

<div class="chart-card">
<h3>Grafik Suhu</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="chart-card">
<h3>Grafik Kelembapan</h3>
<canvas id="humChart"></canvas>
</div>

</div>

<div class="controls">

<button id="ledOn">
LED ON
</button>

<button id="ledOff">
LED OFF
</button>

</div>

<div class="logs">

<h3>📜 Log Data</h3>

<ul id="logList">

<li>Dashboard Started</li>

</ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
